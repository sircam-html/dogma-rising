<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Interactive map EndGame</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap-theme.min.css">
    <link rel="stylesheet" href="css/fontAwesome.css">
    <link rel="stylesheet" href="css/light-box.css">
    <link rel="stylesheet" href="css/templatemo-style.css">

    <link href="https://fonts.googleapis.com/css?family=Kanit:400,700" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            box-shadow: none !important;
        }

        *::before,
        *::after {
            box-shadow: none !important;
            border: none !important;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #313131;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 9999;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 20px;
            background: transparent;
            pointer-events: none;
        }

        .logo a {
            opacity: 0;
            pointer-events: none;
        }

        /* 🔥 MOVED MORE LEFT */
        .menu-icon {
            position: fixed;
            top: 15px;
            right: 20px;
            transform: translateX(-210px); /* 🔥 increased shift */
            z-index: 10000;
            cursor: pointer;
            pointer-events: auto !important;
        }

        .menu-icon span,
        .menu-icon span:before,
        .menu-icon span:after {
            background: #fff !important;
        }

        /* MAP */
        .map-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: #313131;
        }

        .map-wrapper {
            width: 100%;
            height: 100%;
        }

        .map-iframe {
            position: absolute;
            top: -2px;
            left: 0;
            width: 100vw;
            height: calc(100% + 4px);
            border: none;
        }

        .map-title {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 20px;
            color: #fff;
        }

        /* MENU OVERLAY */
        .overlay-menu {
            z-index: 9000 !important;
        }

        @keyframes pulse {
            0%,100%{opacity:1;}
            50%{opacity:.5;}
        }

        /* 📱 responsive adjustment */
        @media (max-width: 768px) {
            .menu-icon {
                transform: translateX(-120px);
            }
        }
    </style>
</head>

<body>



<section class="map-section">
    <div class="map-wrapper">
        <iframe 
            src="https://edelarrow.github.io/ddo-map-viewer-channel-4/#field000_m00:st0100@-3.00/2816.0/2304.0!elcgan"
            class="map-iframe">
        </iframe>
    </div>
</section>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
<script src="js/vendor/bootstrap.min.js"></script>
<script src="js/plugins.js"></script>
<script src="js/main.js"></script>

</body>
</html>
