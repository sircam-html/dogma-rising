<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Interactive Map EndGame</title><style>*{margin:0;padding:0;box-sizing:border-box}body,html{width:100%;height:100%;overflow:hidden;background:#1a1a1a;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}.map-section{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#1a1a1a;z-index:1}.map-wrapper{width:100%;height:100%}.map-iframe{position:absolute;top:-2px;left:0;width:100vw;height:calc(100% + 4px);border:none}.map-title{position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(0,0,0,.75);color:#fff;padding:10px 30px;border-radius:30px;font-size:1.6rem;font-weight:600;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:none}.overlay-info{position:absolute;bottom:25px;left:25px;z-index:100;background:rgba(0,0,0,.7);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;max-width:320px}</style></head><body><section class="map-section"><div class="map-wrapper"><iframe src="https://edelarrow.github.io/ddo-map-viewer-channel-4/" class="map-iframe" allowfullscreen></iframe></div></section></body></html>
