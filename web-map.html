<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Interactive map</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap-theme.min.css">
    <link rel="stylesheet" href="css/fontAwesome.css">
    <link rel="stylesheet" href="css/light-box.css">
    <link rel="stylesheet" href="css/templatemo-style.css">

    <link href="https://fonts.googleapis.com/css?family=Kanit:100,200,300,400,500,600,700,800,900" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        body {
            background-color: #313131;
            color: #ffffff;
            overflow: hidden;
        }

        /* NAV (transparent, fixed) */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: transparent !important;
        }

        /* hide logo but keep layout */
        .logo a {
            opacity: 0;
            pointer-events: none;
        }

        /* 🔥 FIXED MENU ICON */
        .menu-icon {
            position: fixed !important;
            top: 15px;
            right: 20px;
            z-index: 10000 !important;
            cursor: pointer;
        }

        /* force icon color */
        .menu-icon span,
        .menu-icon span:before,
        .menu-icon span:after {
            background: #ffffff !important;
        }

        /* force X color */
        .menu-icon.active span,
        .menu-icon.active span:before,
        .menu-icon.active span:after {
            background: #ffffff !important;
        }

        /* FULLSCREEN MAP */
        .map-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        .map-wrapper {
            width: 100%;
            height: 100%;
        }

        .map-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .map-title {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(49,49,49,0.85);
            padding: 8px 25px;
            border-radius: 25px;
            font-size: 1.4rem;
        }

        /* overlay BELOW button */
        .overlay-menu {
            position: relative;
            z-index: 9000 !important;
        }

        /* animation */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .no-click {
            pointer-events: none;
            cursor: default;
        }
    </style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">
        <a href="#">.</a>
    </div>
    <div class="menu-icon">
        <span></span>
    </div>
</nav>

<!-- MAP -->
<section class="map-section">
    <h2 class="map-title">Interactive Map</h2>

    <div class="map-wrapper">
        <iframe 
            src="https://edelarrow.github.io/ddo-map-viewer-normal-channels"
            class="map-iframe"
            title="Map">
        </iframe>
    </div>
</section>

<!-- MENU -->
<section class="overlay-menu">
    <div class="container">
        <div class="main-menu">
            <ul>
                <li><a href="https://dogmarising.netlify.app/">Home</a></li>
                <li><a href='https://dogmarising.netlify.app/about'>About Us</a></li>
                <li><a href='https://dogmarising.netlify.app/news'>Latest info</a></li>
                <li><a href='https://dogmarising.netlify.app/contact'>Contact form</a></li>
            </ul>

            <!-- SERVER STATUS -->
            <div style="display:flex;justify-content:center;align-items:center;padding:20px">
                <div style="background:rgba(20,20,25,.98);padding:18px;border-radius:11px;box-shadow:0 7px 18px rgba(0,0,0,.5);text-align:left;width:310px;color:#fff">

                    <div style="display:flex;align-items:center;gap:11px;margin-bottom:14px">
                        <div style="width:11px;height:11px;background:#4CAF50;border-radius:50%;animation:pulse 2s infinite;"></div>
                        <h2 style="font-size:1.45rem;margin:0;text-transform:uppercase;">
                            Server Status
                        </h2>
                    </div>

                    <div><strong>Lobby IP:</strong> dogmarising.org | <strong>Port:</strong> 52100</div>
                    <div style="margin:10px 0;"><strong>DL IP:</strong> dogmarising.org | <strong>Port:</strong> 52099</div>
                    <div>Condition: <span style="color:#4CAF50;font-weight:800">Online</span></div>

                </div>
            </div>

        </div>
    </div>
</section>

<!-- SCRIPTS (UNCHANGED) -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
<script src="js/vendor/bootstrap.min.js"></script>
<script src="js/plugins.js"></script>
<script src="js/main.js"></script>

</body>
</html>
