<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Interactive map</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap-theme.min.css">
    <link rel="stylesheet" href="css/fontAwesome.css">
    <link rel="stylesheet" href="css/light-box.css">
    <link rel="stylesheet" href="css/templatemo-style.css">

    <link href="https://fonts.googleapis.com/css?family=Kanit:400,700" rel="stylesheet">

    <style>
        /* RESET EVERYTHING THAT CAN CAUSE SHADOW LINES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            box-shadow: none !important;   /* 🔥 remove ALL shadows */
        }

        *::before,
        *::after {
            box-shadow: none !important;
            border: none !important;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #313131;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 9999;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 20px;
            background: transparent;
            pointer-events: none;
        }

        .logo a {
            opacity: 0;
            pointer-events: none;
        }

        .menu-icon {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 10000;
            cursor: pointer;
            pointer-events: auto !important;
        }

        .menu-icon span,
        .menu-icon span:before,
        .menu-icon span:after {
            background: #fff !important;
        }

        /* MAP (force no seam, no shadow) */
        .map-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: #313131;
        }

        .map-wrapper {
            width: 100%;
            height: 100%;
        }

        .map-iframe {
            position: absolute;
            top: -2px; /* 🔥 overlap to kill shadow seam */
            left: 0;
            width: 100vw;
            height: calc(100% + 4px);
            border: none;
            display: block;
        }

        .map-title {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 20px;
            color: #fff;
        }

        /* OVERLAY MENU */
        .overlay-menu {
            z-index: 9000 !important;
        }

        @keyframes pulse {
            0%,100%{opacity:1;}
            50%{opacity:.5;}
        }
    </style>
</head>

<body>

<nav>
    <div class="logo"><a href="#">.</a></div>
    <div class="menu-icon">
        <span></span>
    </div>
</nav>

<section class="map-section">
    <div class="map-wrapper">
        <iframe 
            src="https://edelarrow.github.io/ddo-map-viewer-normal-channels"
            class="map-iframe">
        </iframe>
    </div>
</section>

<!-- MENU + SERVER STATUS -->
  <section class="overlay-menu">
    <div class="container">
      <div class="main-menu">
        <ul>
          <li><a href="https://dogmarising.netlify.app/">Home</a></li>
           <li><a href='https://dogmarising.netlify.app/about'>About Us</a></li>
          <li><a href='https://dogmarising.netlify.app/news'>Latest info</a></li>
          <li><a href="/" class="no-click" >Interactive map (soon™)</a></li>
        </ul>

        <!-- SERVER STATUS -->
        <div style="display:flex;justify-content:center;align-items:center;padding:20px">
          <div style="background:rgba(20,20,25,.98);padding:18px;border-radius:11px;box-shadow:0 7px 18px rgba(0,0,0,.5);text-align:left;width:310px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff;font-size:1rem">

            <div style="display:flex;align-items:center;gap:11px;margin-bottom:14px">
              <div style="width:11px;height:11px;background:#4CAF50;border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 9px rgba(76,175,80,.4)"></div>
              <h2 style="font-size:1.45rem;font-weight:800;color:#fff;margin:0;text-transform:uppercase;letter-spacing:.9px">
                Server Status
              </h2>
            </div>

            <div style="margin-bottom:7px">
              <strong>Lobby IP:</strong> dogmarising.org | <strong>Port:</strong> 52100
            </div>

            <div style="margin-bottom:14px">
              <strong>DL IP:</strong> dogmarising.org | <strong>Port:</strong> 52099
            </div>

            <div>
              Condition:
              <span style="color:#4CAF50;font-weight:800">Online</span>
            </div>

          </div>
        </div>

        <style>
          @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
          }
        </style>

      </div>
    </div>
  </section>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
<script src="js/vendor/bootstrap.min.js"></script>
<script src="js/plugins.js"></script>
<script src="js/main.js"></script>

</body>
</html>
