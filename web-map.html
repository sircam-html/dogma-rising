<!DOCTYPE html>
<html>
<head>

    <!-- CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap-theme.min.css">
    <link rel="stylesheet" href="css/fontAwesome.css">
    <link rel="stylesheet" href="css/light-box.css">
    <link rel="stylesheet" href="css/templatemo-style.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Kanit:100,200,300,400,500,600,700,800,900" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        body {
            background-color: #313131;
            color: #ffffff;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
        }

        .container {
            padding: 60px 15px;
        }

        /* FULL PAGE MAP - NO FOOTER */
        .map-section {
            flex: 1;
            padding: 37px 0 0 0 !important;
            margin: 0;
            min-height: 0;
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            background: #313131;
            display: flex;
            flex-direction: column;
        }

        .map-header-space {
            height: 37px;
            flex-shrink: 0;
        }

        .map-wrapper {
            flex: 1;
            padding: 0 !important;
            margin: 0;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
            width: 100vw;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
        }

        .map-iframe {
            width: 100vw !important;
            height: 100% !important;
            border: none;
            display: block;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 0;
        }

        .map-title {
            position: absolute;
            top: 52px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(49,49,49,0.95);
            padding: 8px 25px;
            border-radius: 25px;
            margin: 0;
            font-size: 1.4rem;
        }

        .container-fluid {
            padding: 0;
        }

        /* PULSE ANIMATION */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>

    <!-- NO CLICK -->
    <style>
        .no-click {
            pointer-events: none;
            cursor: default;
            text-decoration: underline;
            color: blue;
        }
    </style>
</head>
